<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Comparison · Financial Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    main#main { padding: 1.75rem 1.5rem 3rem; }

    /* ── Page header ─────────────────────────────────────────────── */
    .comp-category {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand);
      margin: 0 0 0.35rem;
    }
    .comp-title {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text);
      margin: 0 0 0.35rem;
      line-height: 1.15;
    }
    .comp-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 1.5rem;
    }

    /* ── Controls bar ────────────────────────────────────────────── */
    .comp-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .comp-chips {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .agent-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--brand-light);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.45rem 0.28rem 0.3rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }
    .chip-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 1px;
      margin-left: 1px;
      transition: color 0.15s;
    }
    .chip-remove:hover { color: var(--brand-dark); }

    /* Add agent button + dropdown */
    .comp-add-wrap { position: relative; }
    .comp-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .comp-add-btn:hover    { background: var(--brand-dark); }
    .comp-add-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .comp-add-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 300;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(32,33,36,0.13);
      width: 270px;
      overflow: hidden;
    }
    .comp-search {
      display: block;
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: none;
      border-bottom: 1px solid var(--border);
      background: var(--bg-page);
      font-size: 0.85rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }
    .comp-search::placeholder { color: var(--text-muted); }
    .comp-agent-list {
      list-style: none;
      margin: 0;
      padding: 0.4rem 0;
      max-height: 230px;
      overflow-y: auto;
    }
    .comp-agent-list li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--text);
      transition: background 0.1s;
    }
    .comp-agent-list li:hover          { background: var(--bg-page); }
    .comp-agent-list li.already-added  { opacity: 0.45; cursor: not-allowed; }
    .comp-agent-list li.already-added:hover { background: none; }
    .list-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .list-info          { flex: 1; }
    .list-name          { font-weight: 600; display: block; }
    .list-rank          { font-size: 0.7rem; color: var(--text-muted); }

    /* Period tabs */
    .period-tabs { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .period-tab {
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.72rem;
      font-size: 0.77rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .period-tab:hover        { border-color: var(--brand); color: var(--brand); }
    .period-tab.active       { background: var(--brand); border-color: var(--brand); color: #fff; }
    .period-tab.year-tab     { background: var(--surface-subtle); color: var(--text-muted); }
    .period-tab:disabled     { opacity: 0.45; cursor: default; }

    /* ── Comparison table ────────────────────────────────────────── */
    .comp-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }
    .comp-table .col-lbl { width: 170px; min-width: 130px; }

    .comp-table thead th.th-agent {
      padding: 1rem 1.25rem 0.9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      position: relative;
      min-width: 180px;
    }
    .comp-table thead th.th-lbl,
    .comp-table thead th.th-crn {
      border-bottom: 1px solid var(--border);
    }
    .agent-col-wrap {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .agent-col-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .agent-col-info    { flex: 1; }
    .agent-col-name    { font-size: 0.88rem; font-weight: 700; color: var(--text); margin: 0 0 0.15rem; line-height: 1.2; display: block; }
    .agent-col-team    { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }
    .agent-col-remove  {
      position: absolute; top: 0.7rem; right: 0.75rem;
      background: none; border: none; cursor: pointer;
      color: var(--border-strong); font-size: 1.05rem; line-height: 1;
      transition: color 0.15s; padding: 0;
    }
    .agent-col-remove:hover { color: var(--brand); }

    .comp-table tbody tr + tr td { border-top: 1px solid var(--border); }
    .comp-table tbody tr:hover td { background: var(--surface-subtle); }

    .comp-table td.td-lbl { padding: 0.85rem 1.25rem; vertical-align: top; }
    .m-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1.3;
    }
    .m-sublabel { font-size: 0.68rem; color: var(--text-muted); opacity: 0.7; margin-top: 0.05rem; }

    .comp-table td.td-val { padding: 0.85rem 1.25rem; vertical-align: top; }
    .m-value {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .m-value.is-winner  { color: var(--brand); }
    .m-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem; display: block; }


    /* ── Monthly breakdown ───────────────────────────────────────── */
    .monthly-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }
    .monthly-head {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .monthly-head h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0;
    }
    .monthly-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }
    .monthly-table th {
      padding: 0.55rem 1.25rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-subtle);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .monthly-table td {
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .monthly-table tr:hover td { background: var(--surface-subtle); }
    .monthly-table .td-month {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .monthly-table .td-best { color: var(--brand); font-weight: 700; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .comp-empty {
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
    }
    .comp-empty strong { display: block; font-size: 1rem; color: var(--text); margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Track leads, FYC performance, appointments, and agent activity</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <main id="main">
    <p class="comp-category">Tools</p>
    <h1 class="comp-title">Agent Comparison</h1>
    <p class="comp-subtitle">Place up to four agents side by side. Totals at the top, month-by-month below.</p>

    <!-- Controls: chips + period tabs -->
    <div class="comp-controls">
      <div class="comp-chips" id="comp-chips">
        <div class="comp-add-wrap" id="comp-add-wrap">
          <button class="comp-add-btn" id="add-agent-btn" aria-haspopup="listbox" aria-expanded="false">
            + Add another agent
          </button>
          <div class="comp-add-dropdown" id="add-dropdown" hidden>
            <input type="text" class="comp-search" id="agent-search" placeholder="Search agent…" autocomplete="off" />
            <ul class="comp-agent-list" id="agent-list-ul" role="listbox" aria-label="Select an agent"></ul>
          </div>
        </div>
      </div>

      <div class="period-tabs" role="group" aria-label="Period">
        <button class="period-tab active" data-period="ytd">YTD</button>
        <button class="period-tab" data-period="month">This month</button>
        <button class="period-tab" data-period="q1">Q1</button>
        <button class="period-tab" data-period="q2">Q2</button>
        <button class="period-tab" data-period="q3">Q3</button>
        <button class="period-tab" data-period="q4">Q4</button>
        <button class="period-tab year-tab" disabled aria-disabled="true">2026</button>
      </div>
    </div>

    <!-- Comparison table (rendered by JS) -->
    <div id="comp-table-wrap" class="comp-table-wrap"></div>

    <!-- Month-by-month (rendered by JS) -->
    <div id="comp-monthly"></div>
  </main>

  <footer class="site-footer">
    <p>AIA Financial Agent Dashboard &mdash; Internal Use Only</p>
  </footer>

  <script src="nav.js"></script>
  <script src="auth.js"></script>
  <script>
    // ─── Dataset ──────────────────────────────────────────────────────────
    const AGENTS = [
      { name: "Alicia Tan",   rank: 1,  ytdFyc: 34525, delta: 435,  cases: 14, team: "SP-ALPHA-GABY"   },
      { name: "Brandon Lee",  rank: 2,  ytdFyc: 23210, delta: 44,   cases: 10, team: "SP-BETA-GABY"    },
      { name: "Chloe Ong",    rank: 3,  ytdFyc: 9400,  delta: -39,  cases:  5, team: "SP-GAMMA-GABY"   },
      { name: "Darren Lim",   rank: 4,  ytdFyc: 8025,  delta:   0,  cases:  4, team: "SP-DELTA-GABY"   },
      { name: "Farah Rahim",  rank: 5,  ytdFyc: 7627,  delta: -26,  cases:  4, team: "SP-EPSILON-GABY" },
      { name: "Gavin Teo",    rank: 6,  ytdFyc: 6577,  delta: 346,  cases:  3, team: "SP-ZETA-GABY"    },
      { name: "Hui Min Chua", rank: 7,  ytdFyc: 6100,  delta:  76,  cases:  3, team: "SP-ETA-GABY"     },
      { name: "Isaac Wong",   rank: 8,  ytdFyc: 5240,  delta: -55,  cases:  2, team: "SP-THETA-GABY"   },
      { name: "Jia En Low",   rank: 9,  ytdFyc: 4941,  delta: -56,  cases:  2, team: "SP-IOTA-GABY"    },
      { name: "Kumar Singh",  rank: 10, ytdFyc: 2022,  delta:   0,  cases:  1, team: "SP-KAPPA-GABY"   }
    ];

    // Cumulative district YTD by month (Jan–May actual, Jun–Dec projected)
    const DISTRICT_CUM = [6200,12400,18800,33100,45500,58600,68800,74200,87500,96800,104600,111800];
    const MONTHS       = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
    const TOTAL_YTD    = AGENTS.reduce((s, a) => s + a.ytdFyc, 0);
    const SLOT_COLORS  = ["#a6192e", "#374151", "#6d5bd0", "#059669"];

    // ─── Helpers ──────────────────────────────────────────────────────────
    function initials(name) {
      const p = name.trim().split(" ");
      return (p[0][0] + (p[p.length - 1][0] || "")).toUpperCase();
    }
    function fmt(n)    { return "SGD " + Math.round(n).toLocaleString("en-SG"); }
    function slotColor(i) { return SLOT_COLORS[i % SLOT_COLORS.length]; }

    function agentCum(agent) {
      const r = agent.ytdFyc / TOTAL_YTD;
      return DISTRICT_CUM.map(v => Math.round(v * r));
    }
    function agentInc(agent) {
      const c = agentCum(agent);
      return c.map((v, i) => i === 0 ? v : v - c[i - 1]);
    }

    // ─── Period helpers ────────────────────────────────────────────────────
    function periodInfo(period) {
      const ranges = {
        ytd:   { start: 0, end: 4, label: "Jan – May · 2026",              future: false },
        month: { start: 4, end: 4, label: "May · 2026",                    future: false },
        q1:    { start: 0, end: 2, label: "Jan – Mar · 2026",              future: false },
        q2:    { start: 3, end: 4, label: "Apr – May · 2026 (partial)",    future: false },
        q3:    { start: 6, end: 8, label: "Jul – Sep · 2026",              future: true  },
        q4:    { start: 9, end: 11, label: "Oct – Dec · 2026",             future: true  },
      };
      return ranges[period] || ranges.ytd;
    }

    function agentPeriodMetrics(agent, period) {
      const { start, end, label, future } = periodInfo(period);
      if (future) return { label, available: false };

      const inc     = agentInc(agent);
      const slice   = inc.slice(start, end + 1);
      const fyc     = slice.reduce((s, v) => s + v, 0);
      const months  = slice.length;
      const bestVal = Math.max(...slice);
      const bestIdx = start + slice.indexOf(bestVal);
      const anp     = Math.round(fyc * 4.25);

      let cases;
      if (period === "ytd")   cases = agent.cases;
      else if (period === "q1") cases = Math.round(agent.cases * 3 / 5);
      else if (period === "q2") cases = Math.round(agent.cases * 2 / 5);
      else                    cases = Math.max(0, Math.round(agent.cases / 5));

      return {
        label, available: true,
        fyc, anp, cases,
        avgMonthly: Math.round(fyc / months),
        bestMonth: bestVal,
        bestMonthName: MONTHS[bestIdx],
        months
      };
    }

    // ─── State ────────────────────────────────────────────────────────────
    let selected = [];    // array of agent indices
    let period   = "ytd";

    // ─── Add / Remove ─────────────────────────────────────────────────────
    function addAgent(idx) {
      if (selected.includes(idx) || selected.length >= 4) return;
      selected.push(idx);
      render();
    }
    function removeAgent(slotIdx) {
      selected.splice(slotIdx, 1);
      render();
    }

    // ─── Dropdown ─────────────────────────────────────────────────────────
    function openDropdown() {
      const dd  = document.getElementById("add-dropdown");
      const btn = document.getElementById("add-agent-btn");
      dd.hidden = false;
      btn.setAttribute("aria-expanded", "true");
      const inp = document.getElementById("agent-search");
      inp.value = "";
      renderDropdownList("");
      inp.focus();
    }
    function closeDropdown() {
      const dd  = document.getElementById("add-dropdown");
      const btn = document.getElementById("add-agent-btn");
      dd.hidden = true;
      btn.setAttribute("aria-expanded", "false");
    }
    function renderDropdownList(q) {
      const ul = document.getElementById("agent-list-ul");
      ul.innerHTML = "";
      const lq = q.trim().toLowerCase();
      let count = 0;
      AGENTS.forEach((a, idx) => {
        if (lq && !a.name.toLowerCase().includes(lq) && !a.team.toLowerCase().includes(lq)) return;
        const added = selected.includes(idx);
        const nextColor = slotColor(selected.length);
        const li = document.createElement("li");
        if (added) li.className = "already-added";
        li.setAttribute("role", "option");
        li.innerHTML = `
          <span class="list-avatar" style="background:${added ? "#c9c3b8" : nextColor}">${initials(a.name)}</span>
          <span class="list-info">
            <span class="list-name">${a.name}</span>
            <span class="list-rank">Rank #${a.rank} · ${a.team}</span>
          </span>
          ${added ? '<span style="font-size:0.7rem;color:#c0b0a0">Added</span>' : ""}
        `;
        if (!added) li.addEventListener("click", () => { addAgent(idx); closeDropdown(); });
        ul.appendChild(li);
        count++;
      });
      if (count === 0) {
        ul.innerHTML = `<li style="padding:0.7rem 0.9rem;color:#b0a090;font-size:0.82rem;cursor:default">No results</li>`;
      }
    }

    document.getElementById("add-agent-btn").addEventListener("click", e => {
      e.stopPropagation();
      const dd = document.getElementById("add-dropdown");
      dd.hidden ? openDropdown() : closeDropdown();
    });
    document.getElementById("agent-search").addEventListener("input", e => renderDropdownList(e.target.value));
    document.addEventListener("click", e => {
      if (!document.getElementById("comp-add-wrap").contains(e.target)) closeDropdown();
    });

    // ─── Render ───────────────────────────────────────────────────────────
    function render() {
      renderChips();
      renderTable();
    }

    function renderChips() {
      const container = document.getElementById("comp-chips");
      container.querySelectorAll(".agent-chip").forEach(c => c.remove());
      const addWrap = document.getElementById("comp-add-wrap");

      selected.forEach((agentIdx, slot) => {
        const a = AGENTS[agentIdx];
        const color = slotColor(slot);
        const chip = document.createElement("div");
        chip.className = "agent-chip";
        chip.innerHTML = `
          <span class="chip-avatar" style="background:${color}">${initials(a.name)}</span>
          <span>${a.name}</span>
          <button class="chip-remove" aria-label="Remove ${a.name}" data-slot="${slot}">&times;</button>
        `;
        chip.querySelector(".chip-remove").addEventListener("click", () => removeAgent(slot));
        container.insertBefore(chip, addWrap);
      });

      const btn = document.getElementById("add-agent-btn");
      btn.disabled = selected.length >= 4;
      renderDropdownList(document.getElementById("agent-search").value || "");
    }

    function winnerIdx(nums) {
      const valid = nums.map(n => (typeof n === "number" && isFinite(n)) ? n : -Infinity);
      const max   = Math.max(...valid);
      if (max === -Infinity) return -1;
      return valid.filter(v => v === max).length > 1 ? -1 : valid.indexOf(max);
    }

    function renderTable() {
      const wrap    = document.getElementById("comp-table-wrap");
      const monthly = document.getElementById("comp-monthly");

      if (selected.length === 0) {
        wrap.innerHTML = `<div class="comp-empty"><strong>No agents selected</strong>Click "+ Add another agent" above to get started.</div>`;
        monthly.innerHTML = "";
        return;
      }

      const cols = selected.map((idx, slot) => ({
        agent:   AGENTS[idx],
        color:   slotColor(slot),
        slot,
        metrics: agentPeriodMetrics(AGENTS[idx], period)
      }));

      // Metric definitions
      const metrics = [
        {
          key: "period",
          label: "PERIOD", sub: "",
          vals: cols.map(c => ({ text: c.metrics.label || "—", num: null })),
          noWinner: true
        },
        {
          key: "fyc",
          label: "FYC", sub: "",
          vals: cols.map(c => ({ text: c.metrics.available ? fmt(c.metrics.fyc) : "—", num: c.metrics.fyc ?? null }))
        },
        {
          key: "anp",
          label: "ANP", sub: "",
          vals: cols.map(c => ({ text: c.metrics.available ? fmt(c.metrics.anp) : "—", num: c.metrics.anp ?? null }))
        },
        {
          key: "cases",
          label: "CASES", sub: "",
          vals: cols.map(c => ({ text: c.metrics.available ? c.metrics.cases : "—", num: c.metrics.cases ?? null }))
        },
        {
          key: "avg",
          label: "AVG MONTHLY FYC",
          sub: cols[0]?.metrics.available ? `across ${cols[0].metrics.months} month${cols[0].metrics.months !== 1 ? "s" : ""}` : "",
          vals: cols.map(c => ({ text: c.metrics.available ? fmt(c.metrics.avgMonthly) : "—", num: c.metrics.avgMonthly ?? null }))
        },
        {
          key: "best",
          label: "BEST MONTH", sub: "Highest FYC",
          vals: cols.map(c => ({
            text:    c.metrics.available ? fmt(c.metrics.bestMonth) : "—",
            subtext: c.metrics.available ? c.metrics.bestMonthName : "",
            num:     c.metrics.bestMonth ?? null
          }))
        },
        {
          key: "rank",
          label: "DISTRICT RANK", sub: "",
          vals: cols.map(c => ({ text: "#" + c.agent.rank, num: -c.agent.rank })) // lower rank = better
        },
        {
          key: "delta",
          label: "DELTA", sub: "vs last period",
          vals: cols.map(c => ({
            text: c.agent.delta === 0 ? "—" : (c.agent.delta > 0 ? "+" : "") + c.agent.delta + "%",
            num: c.agent.delta
          }))
        }
      ];

      // Build table
      let html = `<table class="comp-table">
        <colgroup>
          <col class="col-lbl" />
          ${cols.map(() => `<col />`).join("")}
        </colgroup>
        <thead><tr>
          <th class="th-lbl"></th>
          ${cols.map(c => `
            <th class="th-agent" scope="col">
              <div class="agent-col-wrap">
                <div class="agent-col-avatar" style="background:${c.color}">${initials(c.agent.name)}</div>
                <div class="agent-col-info">
                  <span class="agent-col-name">${c.agent.name}</span>
                  <span class="agent-col-team">${c.agent.team}</span>
                </div>
              </div>
              <button class="agent-col-remove" data-slot="${c.slot}" aria-label="Remove ${c.agent.name}">&times;</button>
            </th>
          `).join("")}
        </tr></thead>
        <tbody>
      `;

      metrics.forEach(m => {
        const wi = m.noWinner ? -1 : winnerIdx(m.vals.map(v => v.num));
        html += `<tr>
          <td class="td-lbl">
            <span class="m-label">${m.label}</span>
            ${m.sub ? `<span class="m-sublabel">${m.sub}</span>` : ""}
          </td>
          ${m.vals.map((v, i) => `
            <td class="td-val">
              <span class="m-value${i === wi ? " is-winner" : ""}">${v.text}</span>
              ${v.subtext ? `<span class="m-sub">${v.subtext}</span>` : ""}
            </td>
          `).join("")}
        </tr>`;
      });

      html += `</tbody></table>`;
      wrap.innerHTML = html;

      // Wire remove buttons inside table
      wrap.querySelectorAll(".agent-col-remove").forEach(btn => {
        btn.addEventListener("click", () => removeAgent(+btn.dataset.slot));
      });

      renderMonthly(cols);
    }

    function renderMonthly(cols) {
      const section = document.getElementById("comp-monthly");
      const { start, end, future } = periodInfo(period);
      if (future || start === end) { section.innerHTML = ""; return; }

      const monthIdxs = Array.from({ length: end - start + 1 }, (_, i) => start + i);
      const agentIncs = cols.map(c => agentInc(c.agent));

      let html = `<div class="monthly-wrap">
        <div class="monthly-head"><h2>Month-by-month FYC</h2></div>
        <table class="monthly-table">
          <colgroup>
            <col style="width:80px" />
            ${cols.map(() => `<col />`).join("")}
          </colgroup>
          <thead><tr>
            <th>Month</th>
            ${cols.map(c => `<th>${c.agent.name.split(" ")[0]}</th>`).join("")}
          </tr></thead>
          <tbody>`;

      monthIdxs.forEach(mi => {
        const vals = agentIncs.map(inc => inc[mi]);
        const wi   = winnerIdx(vals);
        html += `<tr>
          <td class="td-month">${MONTHS[mi]}</td>
          ${vals.map((v, i) => `<td class="${i === wi ? "td-best" : ""}">${fmt(v)}</td>`).join("")}
        </tr>`;
      });

      html += `</tbody></table></div>`;
      section.innerHTML = html;
    }

    // ─── Period tab wiring ────────────────────────────────────────────────
    document.querySelectorAll(".period-tab[data-period]").forEach(tab => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".period-tab").forEach(t => t.classList.remove("active"));
        tab.classList.add("active");
        period = tab.dataset.period;
        renderTable();
      });
    });

    // ─── Init ─────────────────────────────────────────────────────────────
    addAgent(0);
    addAgent(1);
  </script>
</body>
</html>
