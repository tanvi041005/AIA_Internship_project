<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIA Elite Academy | Announcements</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="stylesheet" href="announcements.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="text-slate-800">
  <script src="../backend/nav.js"></script>
  <script src="../backend/auth.js"></script>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Announcements</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <main class="max-w-5xl mx-auto px-4 py-8 space-y-6">
    <section id="announcement-create-panel" class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden hidden"></section>
    <section class="bg-white border border-slate-200 rounded-2xl shadow-sm overflow-hidden">
      <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">
        <h2 class="text-xl font-bold flex items-center gap-2">
          <i class="fa-solid fa-bullhorn aia-red"></i>
          Team Announcements
        </h2>
        <p class="text-sm text-slate-500 mt-1">Leaders and district managers can publish announcements. Agents can respond directly below each one.</p>
      </div>
      <div id="announcement-list" class="p-6 space-y-5"></div>
    </section>
  </main>

  <script src="../backend/announcements.js"></script>
</body>
</html>
