<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login · Financial Agent Dashboard</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <main id="main">
    <section class="panel form-card login-role-card">
      <h1 class="page-title">Sign in to Dashboard</h1>
      <p class="page-lede">Use your assigned agent code. Admin assigns the dashboard role.</p>

      <form id="role-login-form">
        <label for="login-username">User ID</label>
        <input id="login-username" type="text" placeholder="Agent code, e.g. 39449 or ARIEL" required />

        <label for="login-password">Password</label>
        <input id="login-password" type="password" placeholder="Enter password" required />

        <p id="login-role-error" class="form-error" hidden></p>
        <button type="submit">Login</button>
      </form>
    </section>
  </main>

  <script src="../backend/api.js"></script>
  <script src="../backend/auth.js"></script>
</body>
</html>
