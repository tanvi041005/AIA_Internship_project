<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AIA Elite Academy | Agent Training</title>
  <link rel="stylesheet" href="styles.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <style>
    @import url("https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap");
    body { font-family: "Inter", sans-serif; background-color: #f8fafc; }
    .aia-red { color: #d31145; }
    .bg-aia-red { background-color: #d31145; }
    .sidebar-item-active { background-color: #fff1f3; border-left: 4px solid #d31145; color: #d31145; }
    .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; }
    .video-container iframe { position: absolute; inset: 0; width: 100%; height: 100%; border-radius: 0.75rem; }
    .quiz-option:checked + label { border-color: #d31145; background-color: #fff1f3; }
    .topic-row { transition: 0.2s ease; }
    .topic-row:not(.locked):hover { background: #fff7f8; }
    .nav-strip { position: sticky; top: 64px; z-index: 40; background: rgba(255,255,255,.96); border-bottom: 1px solid #dedbd4; box-shadow: 0 1px 8px rgba(32,33,36,.08); backdrop-filter: blur(10px); }
    .nav-inner { max-width: 1120px; margin: 0 auto; padding: .45rem 1rem; display: flex; flex-wrap: wrap; align-items: center; gap: .25rem; }
    .nav-inner a { display: inline-flex; align-items: center; gap: .35rem; min-height: 36px; padding: .45rem .75rem; border-radius: 7px; border: 1px solid transparent; font-size: .875rem; font-weight: 600; color: #69655e; text-decoration: none; transition: background .15s, color .15s, border-color .15s; }
    .nav-inner a:hover { background: #faf9f7; color: #a6192e; }
    .nav-inner a.active { background: #fff1f3; color: #a6192e; border-color: #f4cbd2; }
    .overview-nav-menu, .calendar-nav-menu { position: relative; display: flex; align-items: center; }
    .overview-caret { font-size: .78rem; line-height: 1; }
    .overview-scope-menu, .calendar-section-menu { position: absolute; top: calc(100% + .35rem); left: 0; z-index: 60; min-width: 180px; padding: .35rem; border: 1px solid #dedbd4; border-radius: 8px; background: #fff; box-shadow: 0 10px 24px rgba(32,33,36,.14); opacity: 0; visibility: hidden; transform: translateY(-4px); transition: opacity .15s, transform .15s, visibility .15s; }
    .overview-nav-menu:hover .overview-scope-menu, .overview-nav-menu:focus-within .overview-scope-menu, .overview-nav-menu.is-open .overview-scope-menu, .calendar-nav-menu:hover .calendar-section-menu, .calendar-nav-menu:focus-within .calendar-section-menu, .calendar-nav-menu.is-open .calendar-section-menu { opacity: 1; visibility: visible; transform: translateY(0); }
    .overview-scope-menu button, .calendar-section-menu a { display: block; width: 100%; padding: .55rem .65rem; border: 0; border-radius: 6px; background: #fff; color: #202124; cursor: pointer; font: inherit; font-weight: 650; text-align: left; white-space: nowrap; }
    .overview-scope-menu button:hover, .overview-scope-menu button:focus-visible, .calendar-section-menu a:hover, .calendar-section-menu a:focus-visible { background: #fff1f3; color: #a6192e; }
    .header-user-meta { display: grid; gap: .12rem; justify-items: end; margin-left: auto; min-width: max-content; padding: .32rem .65rem; border: 1px solid #dedbd4; border-radius: 8px; background: #fff; color: #202124; }
    .header-user-meta span { font-size: .72rem; font-weight: 700; letter-spacing: .04em; text-transform: uppercase; color: #69655e; }
    .header-user-meta strong { font-size: .92rem; }
    .nav-user-meta { margin-left: auto; }
    #logout-link { margin-left: 0; }
    @media (max-width: 720px) {
      .nav-inner { overflow-x: auto; flex-wrap: nowrap; gap: .35rem; scrollbar-width: thin; }
      .nav-inner a { white-space: nowrap; }
      .header-user-meta { margin-left: .25rem; justify-items: start; }
    }
  </style>
</head>
<body class="text-slate-800">
  <script src="../backend/nav.js"></script>
  <script src="../backend/api-config.js"></script>
  <script src="../backend/api.js"></script>
  <script src="../backend/auth.js"></script>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Training</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <div class="max-w-7xl mx-auto px-4 py-8 flex flex-col lg:flex-row gap-8">
    <aside class="w-full lg:w-80 flex-shrink-0">
      <div class="sticky top-24">
        <h2 class="text-lg font-bold mb-4 flex items-center"><i class="fa-solid fa-route aia-red mr-2"></i> Learning Path</h2>
        <div class="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden" id="learning-path"></div>
        <div class="mt-6 p-4 bg-gradient-to-br from-slate-800 to-slate-900 rounded-xl text-white shadow-lg">
          <p class="text-xs font-medium text-slate-400 uppercase tracking-widest">Next Achievement</p>
          <h4 class="font-bold mt-1">Certified Protection Consultant</h4>
          <div class="flex items-center mt-3 text-xs text-slate-300">
            <i class="fa-solid fa-award aia-red text-lg mr-2"></i>
            <span id="achievement-note">Complete all modules</span>
          </div>
        </div>
      </div>
    </aside>

    <main class="flex-grow space-y-8">
      <section id="topic-view"></section>
      <section id="quiz-view"></section>
      <section id="progress-view"></section>
    </main>
  </div>

  <footer class="mt-20 border-t border-slate-200 py-10 bg-white">
    <div class="max-w-7xl mx-auto px-4 text-center">
      <p class="text-slate-400 text-sm">© 2026 AIA Elite Academy. All rights reserved.</p>
    </div>
  </footer>

  <script src="https://www.youtube.com/iframe_api"></script>
  <script src="../backend/training.js"></script>
</body>
</html>
