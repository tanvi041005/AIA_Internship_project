<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Agent Comparison · Financial Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    main#main { padding: 1.75rem 1.5rem 3rem; }

    /* ── Page header ─────────────────────────────────────────────── */
    .comp-category {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--brand);
      margin: 0 0 0.35rem;
    }
    .comp-title {
      font-size: 1.9rem;
      font-weight: 800;
      color: var(--text);
      margin: 0 0 0.35rem;
      line-height: 1.15;
    }
    .comp-subtitle {
      font-size: 0.875rem;
      color: var(--text-muted);
      margin: 0 0 1.5rem;
    }

    /* ── Controls bar ────────────────────────────────────────────── */
    .comp-controls {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.75rem;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      flex-wrap: wrap;
    }
    .comp-chips {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      flex-wrap: wrap;
    }
    .agent-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--brand-light);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.45rem 0.28rem 0.3rem;
      font-size: 0.82rem;
      font-weight: 600;
      color: var(--text);
    }
    .chip-avatar {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .chip-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      line-height: 1;
      padding: 0 1px;
      margin-left: 1px;
      transition: color 0.15s;
    }
    .chip-remove:hover { color: var(--brand-dark); }

    /* Add agent button + dropdown */
    .comp-add-wrap { position: relative; }
    .comp-add-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: 0.35rem 0.9rem;
      font-size: 0.82rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      transition: background 0.15s;
      white-space: nowrap;
    }
    .comp-add-btn:hover    { background: var(--brand-dark); }
    .comp-add-btn:disabled { opacity: 0.45; cursor: not-allowed; }
    .comp-add-dropdown {
      position: absolute;
      top: calc(100% + 8px);
      left: 0;
      z-index: 300;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(32,33,36,0.13);
      width: 270px;
      overflow: hidden;
    }
    .comp-search {
      display: block;
      width: 100%;
      padding: 0.65rem 0.9rem;
      border: none;
      border-bottom: 1px solid var(--border);
      background: var(--bg-page);
      font-size: 0.85rem;
      color: var(--text);
      font-family: inherit;
      outline: none;
      box-sizing: border-box;
    }
    .comp-search::placeholder { color: var(--text-muted); }
    .comp-agent-list {
      list-style: none;
      margin: 0;
      padding: 0.4rem 0;
      max-height: 230px;
      overflow-y: auto;
    }
    .comp-agent-list li {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.5rem 0.9rem;
      cursor: pointer;
      font-size: 0.84rem;
      color: var(--text);
      transition: background 0.1s;
    }
    .comp-agent-list li:hover          { background: var(--bg-page); }
    .comp-agent-list li.already-added  { opacity: 0.45; cursor: not-allowed; }
    .comp-agent-list li.already-added:hover { background: none; }
    .list-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.68rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .list-info          { flex: 1; }
    .list-name          { font-weight: 600; display: block; }
    .list-rank          { font-size: 0.7rem; color: var(--text-muted); }

    /* Period tabs */
    .period-tabs { display: flex; align-items: center; gap: 0.3rem; flex-wrap: wrap; }
    .period-tab {
      background: none;
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 0.28rem 0.72rem;
      font-size: 0.77rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .period-tab:hover        { border-color: var(--brand); color: var(--brand); }
    .period-tab.active       { background: var(--brand); border-color: var(--brand); color: #fff; }
    .period-tab.year-tab     { background: var(--surface-subtle); color: var(--text-muted); }
    .period-tab:disabled     { opacity: 0.45; cursor: default; }

    /* ── Comparison table ────────────────────────────────────────── */
    .comp-table-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
      margin-bottom: 1.25rem;
    }
    .comp-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 520px;
    }
    .comp-table .col-lbl { width: 170px; min-width: 130px; }

    .comp-table thead th.th-agent {
      padding: 1rem 1.25rem 0.9rem;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
      position: relative;
      min-width: 180px;
    }
    .comp-table thead th.th-lbl,
    .comp-table thead th.th-crn {
      border-bottom: 1px solid var(--border);
    }
    .agent-col-wrap {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
    }
    .agent-col-avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 800;
      color: #fff;
      flex-shrink: 0;
    }
    .agent-col-info    { flex: 1; }
    .agent-col-name    { font-size: 0.88rem; font-weight: 700; color: var(--text); margin: 0 0 0.15rem; line-height: 1.2; display: block; }
    .agent-col-team    { font-size: 0.7rem; color: var(--text-muted); font-weight: 500; }
    .agent-col-remove  {
      position: absolute; top: 0.7rem; right: 0.75rem;
      background: none; border: none; cursor: pointer;
      color: var(--border-strong); font-size: 1.05rem; line-height: 1;
      transition: color 0.15s; padding: 0;
    }
    .agent-col-remove:hover { color: var(--brand); }

    .comp-table tbody tr + tr td { border-top: 1px solid var(--border); }
    .comp-table tbody tr:hover td { background: var(--surface-subtle); }

    .comp-table td.td-lbl { padding: 0.85rem 1.25rem; vertical-align: top; }
    .m-label {
      display: block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      line-height: 1.3;
    }
    .m-sublabel { font-size: 0.68rem; color: var(--text-muted); opacity: 0.7; margin-top: 0.05rem; }

    .comp-table td.td-val { padding: 0.85rem 1.25rem; vertical-align: top; }
    .m-value {
      display: block;
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.2;
    }
    .m-value.is-winner  { color: var(--brand); }
    .m-sub { font-size: 0.7rem; color: var(--text-muted); margin-top: 0.15rem; display: block; }


    /* ── Monthly breakdown ───────────────────────────────────────── */
    .monthly-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow-x: auto;
    }
    .monthly-head {
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .monthly-head h2 {
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0;
    }
    .monthly-table {
      width: 100%;
      border-collapse: collapse;
      min-width: 420px;
    }
    .monthly-table th {
      padding: 0.55rem 1.25rem;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--text-muted);
      background: var(--surface-subtle);
      border-bottom: 1px solid var(--border);
      text-align: left;
    }
    .monthly-table td {
      padding: 0.6rem 1.25rem;
      font-size: 0.85rem;
      color: var(--text);
      border-top: 1px solid var(--border);
    }
    .monthly-table tr:hover td { background: var(--surface-subtle); }
    .monthly-table .td-month {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    .monthly-table .td-best { color: var(--brand); font-weight: 700; }

    /* ── Empty state ─────────────────────────────────────────────── */
    .comp-empty {
      padding: 3rem 1.5rem;
      text-align: center;
      color: var(--text-muted);
    }
    .comp-empty strong { display: block; font-size: 1rem; color: var(--text); margin-bottom: 0.3rem; }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Track leads, FYC performance, appointments, and agent activity</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <main id="main">
    <p class="comp-category">Tools</p>
    <h1 class="comp-title">Agent Comparison</h1>
    <p class="comp-subtitle">Place up to four agents side by side. Totals at the top, month-by-month below.</p>

    <!-- Controls: chips + period tabs -->
    <div class="comp-controls">
      <div class="comp-chips" id="comp-chips">
        <div class="comp-add-wrap" id="comp-add-wrap">
          <button class="comp-add-btn" id="add-agent-btn" aria-haspopup="listbox" aria-expanded="false">
            + Add another agent
          </button>
          <div class="comp-add-dropdown" id="add-dropdown" hidden>
            <input type="text" class="comp-search" id="agent-search" placeholder="Search agent…" autocomplete="off" />
            <ul class="comp-agent-list" id="agent-list-ul" role="listbox" aria-label="Select an agent"></ul>
          </div>
        </div>
      </div>

      <div class="period-tabs" role="group" aria-label="Period">
        <button class="period-tab active" data-period="ytd">YTD</button>
        <button class="period-tab" data-period="month">This month</button>
        <button class="period-tab" data-period="q1">Q1</button>
        <button class="period-tab" data-period="q2">Q2</button>
        <button class="period-tab" data-period="q3">Q3</button>
        <button class="period-tab" data-period="q4">Q4</button>
        <button class="period-tab year-tab" disabled aria-disabled="true">2026</button>
      </div>
    </div>

    <!-- Comparison table (rendered by JS) -->
    <div id="comp-table-wrap" class="comp-table-wrap"></div>

    <!-- Month-by-month (rendered by JS) -->
    <div id="comp-monthly"></div>
  </main>

  <footer class="site-footer">
    <p>AIA Financial Agent Dashboard &mdash; Internal Use Only</p>
  </footer>

  <script src="../backend/nav.js"></script>
  <script src="../backend/api-config.js"></script>
  <script src="../backend/api.js"></script>
  <script src="../backend/auth.js"></script>
  <script src="../backend/agent-comparison.js"></script>
</body>
</html>
