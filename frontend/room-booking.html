<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Room Booking · Financial Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ── Room Booking Styles ── */
    :root {
      --brand: #a6192e;
      --brand-dark: #7d1122;
      --brand-light: #fff1f3;
      --bg-page: #f6f6f4;
      --card: #ffffff;
      --surface-subtle: #faf9f7;
      --border: #dedbd4;
      --border-strong: #c9c3b8;
      --text: #202124;
      --text-muted: #69655e;
      --radius: 8px;
      --shadow-soft: 0 1px 2px rgba(32, 33, 36, 0.06);
    }

    .cal-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.55rem;
      margin-bottom: 1rem;
    }

    .cal-toolbar .view-toggle {
      display: inline-flex;
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
    }

    .view-toggle button {
      padding: 0.42rem 0.78rem;
      border: none;
      background: none;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      border-right: 1px solid var(--border);
    }

    .view-toggle button:last-child {
      border-right: none;
    }

    .view-toggle button.active {
      background: var(--brand-light);
      color: var(--brand);
    }

    .view-toggle button:hover:not(.active) {
      background: var(--surface-subtle);
      color: var(--text);
    }

    .today-btn,
    .nav-btn {
      padding: 0.42rem 0.9rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: #fff;
      font: inherit;
      font-size: 0.84rem;
      font-weight: 600;
      cursor: pointer;
      color: var(--text);
    }

    .nav-btn {
      width: 34px;
      height: 34px;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      color: var(--text-muted);
    }

    .today-btn:hover,
    .nav-btn:hover {
      border-color: var(--border-strong);
      background: var(--surface-subtle);
      color: var(--brand);
    }

    .range-label {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--text);
      min-width: 130px;
      text-align: center;
    }

    .add-btn {
      margin-left: auto;
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      padding: 0.45rem 0.9rem;
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 8px;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
    }

    .add-btn:hover {
      background: var(--brand-dark);
    }

    .cal-shell {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 220px;
      gap: 1rem;
      align-items: start;
    }

    @media (max-width: 860px) {
      .cal-shell {
        grid-template-columns: 1fr;
      }
    }

    .week-grid-wrap {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
    }

    .month-view {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow-soft);
      overflow: hidden;
      display: none;
    }

    .month-grid {
      display: grid;
      grid-template-columns: repeat(7, minmax(120px, 1fr));
    }

    .month-dow {
      padding: 0.55rem 0.65rem;
      background: var(--surface-subtle);
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      font-size: 0.7rem;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .month-dow:nth-child(7n) {
      border-right: none;
    }

    .month-cell {
      min-height: 118px;
      padding: 0.5rem;
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }

    .month-cell:nth-child(7n) {
      border-right: none;
    }

    .month-cell:hover {
      background: #fbfaf8;
    }

    .month-cell.other-month {
      background: #fbfbfa;
      color: var(--border-strong);
    }

    .month-cell.today {
      box-shadow: inset 0 0 0 2px var(--brand);
    }

    .month-cell-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 0.35rem;
      margin-bottom: 0.4rem;
      font-size: 0.78rem;
      font-weight: 700;
    }

    .month-count {
      font-size: 0.68rem;
      color: var(--text-muted);
      font-weight: 600;
    }

    .month-booking {
      display: block;
      width: 100%;
      border: none;
      border-radius: 5px;
      margin-bottom: 0.28rem;
      padding: 0.18rem 0.35rem;
      font: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      text-align: left;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      cursor: pointer;
    }

    .month-more {
      margin-top: 0.2rem;
      font-size: 0.7rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    .week-header {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      border-bottom: 1px solid var(--border);
      background: var(--surface-subtle);
      padding-right: 16px;
      box-sizing: border-box;
    }

    .week-header-cell {
      padding: 0.55rem 0.3rem;
      text-align: center;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: var(--text-muted);
      border-right: 1px solid var(--border);
    }

    .week-header-cell:last-child {
      border-right: none;
    }

    .week-header-cell .day-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      font-size: 0.9rem;
      font-weight: 700;
      margin: 0.2rem auto 0;
      color: var(--text);
    }

    .week-header-cell .day-num.today {
      background: var(--brand);
      color: #fff;
    }

    .week-body {
      display: grid;
      grid-template-columns: 52px repeat(7, 1fr);
      max-height: 560px;
      overflow-y: auto;
      scrollbar-gutter: stable;
    }

    .time-col {
      border-right: 1px solid var(--border);
    }

    .time-slot {
      height: 48px;
      padding: 0.25rem 0.35rem 0;
      font-size: 0.68rem;
      color: var(--text-muted);
      text-align: right;
      border-bottom: 1px solid var(--border);
    }

    .day-col {
      position: relative;
      border-right: 1px solid var(--border);
    }

    .day-col:last-child {
      border-right: none;
    }

    .hour-cell {
      height: 48px;
      border-bottom: 1px solid #f0ede8;
    }

    .booking-block {
      position: absolute;
      left: 2px;
      right: 2px;
      border-radius: 5px;
      padding: 0.2rem 0.35rem;
      font-size: 0.72rem;
      font-weight: 600;
      overflow: hidden;
      cursor: pointer;
      z-index: 2;
      transition: filter 0.15s;
      line-height: 1.3;
      border-left: 3px solid rgba(0, 0, 0, 0.15);
    }

    .booking-block:hover {
      filter: brightness(0.93);
    }

    .booking-block strong {
      display: block;
      font-size: 0.74rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .booking-block small {
      opacity: 0.85;
    }

    .room-eagle {
      background: #dbeafe;
      color: #1e40af;
    }
    .room-summit {
      background: #fee2e2;
      color: #991b1b;
    }
    .room-ark {
      background: #d1fae5;
      color: #065f46;
    }
    .room-armour {
      background: #f3f4f6;
      color: #374151;
    }
    .room-inspiration {
      background: #ede9fe;
      color: #4c1d95;
    }
    .room-nest {
      background: #fef9c3;
      color: #854d0e;
    }

    .sidebar {
      display: grid;
      gap: 1rem;
    }

    .mini-month {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem;
      box-shadow: var(--shadow-soft);
    }

    .mini-month-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 0.6rem;
    }

    .mini-month-head span {
      font-weight: 700;
      font-size: 0.9rem;
    }

    .mini-nav {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      font-size: 1rem;
      padding: 0.1rem 0.25rem;
      border-radius: 4px;
    }

    .mini-nav:hover {
      color: var(--brand);
      background: var(--brand-light);
    }

    .mini-cal {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 2px;
      text-align: center;
      font-size: 0.75rem;
    }

    .mini-cal .dow {
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      font-size: 0.65rem;
      padding: 0.2rem 0;
    }

    .mini-cal .d {
      padding: 0.25rem;
      border-radius: 50%;
      cursor: pointer;
      color: var(--text);
      font-weight: 500;
    }

    .mini-cal .d:hover {
      background: var(--surface-subtle);
      color: var(--brand);
    }

    .mini-cal .d.today {
      background: var(--brand);
      color: #fff;
      font-weight: 700;
    }

    .mini-cal .d.selected {
      outline: 2px solid var(--brand);
    }

    .mini-cal .d.other-month {
      color: var(--border-strong);
    }

    .mini-cal .d.has-event::after {
      content: '';
      display: block;
      width: 4px;
      height: 4px;
      border-radius: 50%;
      background: var(--brand);
      margin: 1px auto 0;
    }

    .room-filter {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.85rem;
      box-shadow: var(--shadow-soft);
    }

    .room-filter h3 {
      margin: 0 0 0.7rem;
      font-size: 0.875rem;
      font-weight: 700;
    }

    .room-chip {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      margin-bottom: 0.45rem;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 600;
      user-select: none;
    }

    .room-chip input {
      accent-color: var(--brand);
      width: 14px;
      height: 14px;
      cursor: pointer;
    }

    .room-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .room-filter-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }

    .room-filter-actions button {
      flex: 1;
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 7px;
      padding: 0.32rem 0.45rem;
      font: inherit;
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--text-muted);
      cursor: pointer;
    }

    .room-filter-actions button:hover {
      border-color: var(--brand);
      color: var(--brand);
      background: var(--brand-light);
    }

    dialog {
      border: none;
      border-radius: var(--radius);
      width: min(520px, 94vw);
      padding: 0;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.18);
    }

    dialog::backdrop {
      background: rgba(0, 0, 0, 0.35);
    }

    .modal-card {
      padding: 1.25rem;
    }

    .modal-card h3 {
      margin: 0 0 1rem;
      font-size: 1.15rem;
    }

    .form-group {
      margin-bottom: 0.75rem;
    }

    .form-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 600;
      margin-bottom: 0.3rem;
    }

    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%;
      padding: 0.52rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      font-size: 0.875rem;
      background: #fff;
    }

    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus {
      outline: 2px solid var(--brand);
      outline-offset: 1px;
      border-color: var(--brand);
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.65rem;
    }

    .modal-actions {
      display: flex;
      justify-content: flex-end;
      gap: 0.5rem;
      margin-top: 1rem;
      padding-top: 0.75rem;
      border-top: 1px solid var(--border);
    }

    .modal-actions .ghost-btn {
      border: 1px solid var(--border);
      background: #fff;
      border-radius: 8px;
      padding: 0.45rem 0.85rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.875rem;
    }

    .modal-actions .ghost-btn:hover {
      border-color: var(--border-strong);
      background: var(--surface-subtle);
    }

    .modal-actions .primary-btn {
      border: none;
      background: var(--brand);
      color: #fff;
      border-radius: 8px;
      padding: 0.45rem 0.95rem;
      cursor: pointer;
      font: inherit;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .modal-actions .primary-btn:hover {
      background: var(--brand-dark);
    }

    .detail-popup {
      position: fixed;
      z-index: 50;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem;
      min-width: 220px;
      max-width: 280px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.14);
      display: none;
    }

    .detail-popup.visible {
      display: block;
    }

    .detail-popup h4 {
      margin: 0 0 0.4rem;
      font-size: 0.95rem;
    }

    .detail-popup p {
      margin: 0.2rem 0;
      font-size: 0.82rem;
      color: var(--text-muted);
    }

    .detail-popup .room-tag {
      display: inline-block;
      padding: 0.12rem 0.45rem;
      border-radius: 999px;
      font-size: 0.72rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .detail-close {
      position: absolute;
      top: 0.5rem;
      right: 0.5rem;
      background: none;
      border: none;
      font-size: 1rem;
      cursor: pointer;
      color: var(--text-muted);
    }

    .detail-actions {
      display: flex;
      gap: 0.4rem;
      margin-top: 0.65rem;
    }

    .detail-actions button {
      flex: 1;
      padding: 0.35rem 0.5rem;
      border-radius: 6px;
      font: inherit;
      font-size: 0.75rem;
      font-weight: 600;
      cursor: pointer;
    }

    .detail-edit {
      background: var(--brand-light);
      color: var(--brand);
      border: 1px solid #f4cbd2;
    }

    .detail-delete {
      background: #fff;
      color: #b91c1c;
      border: 1px solid #fecaca;
    }

    @media (max-width: 720px) {
      .cal-toolbar {
        gap: 0.35rem;
      }
      .week-header,
      .week-body {
        grid-template-columns: 40px repeat(7, 1fr);
      }
      .month-grid {
        grid-template-columns: repeat(7, minmax(92px, 1fr));
        overflow-x: auto;
      }
      .month-cell {
        min-height: 96px;
      }
      .time-slot {
        font-size: 0.6rem;
        padding-right: 0.2rem;
      }
      .booking-block strong {
        font-size: 0.68rem;
      }
    }
  </style>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Room Booking</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <main id="main">
    <h2 class="page-title">Room Booking Calendar</h2>
    <p class="page-lede">Click any slot to create a reservation. Click an existing booking to view details.</p>

    <!-- Toolbar -->
    <div class="cal-toolbar">
      <div class="view-toggle">
        <button id="btn-week" class="active" onclick="setView('week')">Week</button>
        <button id="btn-day" onclick="setView('day')">Day</button>
        <button id="btn-month" onclick="setView('month')">Month</button>
      </div>
      <button class="today-btn" onclick="goToday()">Today</button>
      <button class="nav-btn" onclick="navigate(-1)">&#8249;</button>
      <span class="range-label" id="rangeLabel"></span>
      <button class="nav-btn" onclick="navigate(1)">&#8250;</button>
      <button class="add-btn" onclick="openModal()">&#43; New Booking</button>
    </div>

    <!-- Shell: calendar + sidebar -->
    <div class="cal-shell">
      <!-- Week/Day grid -->
      <div class="week-grid-wrap">
        <div class="week-header" id="weekHeader"></div>
        <div class="week-body" id="weekBody"></div>
      </div>
      <div class="month-view" id="monthView">
        <div class="month-grid" id="monthGrid"></div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <!-- Mini month -->
        <div class="mini-month">
          <div class="mini-month-head">
            <button class="mini-nav" onclick="miniNav(-1)">&#8249;</button>
            <span id="miniMonthLabel"></span>
            <button class="mini-nav" onclick="miniNav(1)">&#8250;</button>
          </div>
          <div class="mini-cal" id="miniCal"></div>
        </div>

        <!-- Room filters -->
        <div class="room-filter">
          <h3>Filter Rooms</h3>
          <div id="roomChips"></div>
          <div class="room-filter-actions">
            <button type="button" onclick="selectAllRooms()">Select all</button>
            <button type="button" onclick="clearRooms()">Clear</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">Financial Agent Dashboard · Internal use only</footer>

  <!-- Booking modal -->
  <dialog id="bookingModal">
    <div class="modal-card">
      <h3 id="modalTitle">New Reservation</h3>
      <div class="form-group">
        <label>Event Title</label>
        <input type="text" id="fTitle" placeholder="e.g. Team standup" />
      </div>
      <div class="form-group">
        <label>Room</label>
        <select id="fRoom"></select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Date</label>
          <input type="date" id="fDate" />
        </div>
        <div class="form-group">
          <label>Booked by</label>
          <input type="text" id="fBy" placeholder="Name" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Start time</label>
          <input type="time" id="fStart" />
        </div>
        <div class="form-group">
          <label>End time</label>
          <input type="time" id="fEnd" />
        </div>
      </div>
      <div class="form-group">
        <label>Recurring Booking</label>
        <select id="fRecurrence">
          <option value="none">None (one-time)</option>
          <option value="daily">Daily</option>
          <option value="weekly">Weekly</option>
          <option value="biweekly">Bi-weekly</option>
          <option value="monthly">Monthly</option>
        </select>
      </div>
      <div class="form-group" id="recurrenceEndGroup" style="display:none;">
        <label>Recurrence End Date (optional)</label>
        <input type="date" id="fRecurrenceEnd" />
      </div>
      <div class="form-group">
        <label>Notes (optional)</label>
        <textarea id="fNotes" rows="2" placeholder="Any additional info..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="ghost-btn" onclick="closeModal()">Cancel</button>
        <button class="primary-btn" onclick="saveBooking()">Save Booking</button>
      </div>
    </div>
  </dialog>

  <!-- Detail popup -->
  <div class="detail-popup" id="detailPopup">
    <button class="detail-close" onclick="closeDetail()">&#10005;</button>
    <div id="detailContent"></div>
  </div>

  <script src="../backend/nav.js"></script>
  <script src="../backend/auth.js"></script>
  <script src="../backend/room-booking.js"></script>
</body>
</html>
