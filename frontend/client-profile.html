<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Profile · Financial Agent Dashboard</title>
  <link rel="stylesheet" href="styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #f5f3f0 0%, #fef9f7 100%);
      font-family: 'Inter', sans-serif;
      color: #202124;
      min-height: 100vh;
    }

    :root {
      --brand: #a6192e;
      --brand-dark: #7d1122;
      --brand-light: #fff1f3;
      --gold: #c69a67;
      --gold-light: #f5e6d3;
      --text: #202124;
      --text-muted: #69655e;
      --border: #dedbd4;
      --surface: #ffffff;
      --shadow: 0 4px 20px rgba(166, 25, 46, 0.08);
    }

    .header-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      box-shadow: var(--shadow);
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--brand);
    }

    .back-btn {
      padding: 0.5rem 1rem;
      background: var(--brand-light);
      color: var(--brand);
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .back-btn:hover {
      background: var(--brand);
      color: white;
    }

    .container {
      max-width: 1200px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .profile-header {
      background: var(--surface);
      border-radius: 16px;
      padding: 2.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow);
      display: grid;
      grid-template-columns: auto 1fr auto;
      gap: 2rem;
      align-items: center;
    }

    .profile-avatar {
      width: 120px;
      height: 120px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
      box-shadow: 0 8px 24px rgba(166, 25, 46, 0.15);
    }

    .profile-info h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--text);
    }

    .profile-subtitle {
      font-size: 1.1rem;
      color: var(--text-muted);
      margin-bottom: 1rem;
    }

    .profile-meta {
      display: flex;
      gap: 2rem;
      flex-wrap: wrap;
    }

    .meta-item {
      display: flex;
      flex-direction: column;
    }

    .meta-label {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .meta-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .profile-actions {
      display: flex;
      gap: 1rem;
    }

    .btn-primary {
      background: var(--brand);
      color: white;
      border: none;
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary:hover {
      background: var(--brand-dark);
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(166, 25, 46, 0.2);
    }

    .btn-secondary {
      background: white;
      color: var(--brand);
      border: 1.5px solid var(--brand);
      padding: 0.7rem 1.4rem;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-secondary:hover {
      background: var(--brand-light);
    }

    .content-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 2rem;
      margin-bottom: 2rem;
    }

    .card {
      background: var(--surface);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
    }

    .card-title {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .section-divider {
      height: 2px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
      margin-bottom: 1.5rem;
    }

    .info-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    .info-item {
      border-left: 3px solid var(--gold);
      padding-left: 1rem;
    }

    .info-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 0.3rem;
    }

    .info-value {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text);
    }

    .risk-score-card {
      background: linear-gradient(135deg, #2c3e50 0%, #34495e 100%);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
      grid-column: span 2;
      text-align: center;
      color: white;
    }

    .risk-score-label {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.8);
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 1rem;
    }

    .risk-score-value {
      font-size: 4rem;
      font-weight: 700;
      margin-bottom: 0.5rem;
      color: var(--gold);
    }

    .risk-score-desc {
      font-size: 1rem;
      color: rgba(255, 255, 255, 0.9);
      margin-bottom: 1rem;
    }

    .risk-details {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
      margin-top: 1.5rem;
      padding-top: 1.5rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .risk-detail {
      text-align: center;
    }

    .risk-detail-value {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--gold);
    }

    .risk-detail-label {
      font-size: 0.8rem;
      color: rgba(255, 255, 255, 0.7);
      margin-top: 0.3rem;
    }

    .timeline-section {
      background: var(--surface);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: var(--shadow);
      grid-column: span 2;
    }

    .timeline {
      position: relative;
      padding-left: 2.5rem;
    }

    .timeline::before {
      content: '';
      position: absolute;
      left: 8px;
      top: 0;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, var(--gold) 0%, transparent 100%);
    }

    .timeline-item {
      margin-bottom: 2rem;
      position: relative;
      padding-left: 1rem;
    }

    .timeline-dot {
      position: absolute;
      left: -15px;
      top: 2px;
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--gold);
      border: 3px solid var(--surface);
    }

    .timeline-item.done .timeline-dot {
      background: #10b981;
    }

    .timeline-item.pending .timeline-dot {
      background: #f59e0b;
    }

    .timeline-title {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
      margin-bottom: 0.35rem;
    }

    .timeline-date {
      font-size: 0.85rem;
      color: var(--text-muted);
      line-height: 1.4;
    }

    .timeline-status {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.2rem 0.5rem;
      border-radius: 4px;
      margin-left: 0.5rem;
    }

    .timeline-status.completed {
      background: #d1fae5;
      color: #065f46;
    }

    .timeline-status.pending {
      background: #fef3c7;
      color: #92400e;
    }

    @media (max-width: 768px) {
      .content-grid {
        grid-template-columns: 1fr;
      }

      .risk-score-card,
      .timeline-section {
        grid-column: span 1;
      }

      .profile-header {
        grid-template-columns: 1fr;
        text-align: center;
      }

      .profile-actions {
        justify-content: center;
      }

      .risk-details {
        grid-template-columns: 1fr;
      }

      .info-grid {
        grid-template-columns: 1fr;
      }
    }

    .error-message {
      background: #fee2e2;
      color: #991b1b;
      padding: 1rem;
      border-radius: 8px;
      text-align: center;
      margin: 2rem auto;
    }

    .loading {
      text-align: center;
      padding: 3rem;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="site-header-inner">
      <h1 class="site-title">Financial Agent Dashboard</h1>
      <p class="site-subtitle">Manage policies, clients, recruitment, and training</p>
    </div>
  </header>

  <div id="site-nav"></div>

  <div class="header-bar">
    <h1 class="header-title">Client Profile</h1>
    <button class="back-btn" onclick="window.location.href='leads.html'">← Back to Leads</button>
  </div>

  <div class="container">
    <div id="profileContent"></div>
  </div>

  <script src="../backend/nav.js"></script>
  <script src="../backend/api-config.js"></script>
  <script src="../backend/api.js"></script>
  <script src="../backend/auth.js"></script>
  <script src="../backend/client-profile.js"></script>
</body>
</html>
